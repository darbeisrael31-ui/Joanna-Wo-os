<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wypłata - ACC Inwestycja</title>
  <style>
    body {
      background-color: #000814;
      color: #d4af37;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      padding: 40px;
    }
    h1 {
      color: #00ff88;
      font-size: 35px;
      margin-bottom: 30px;
    }
    form {
      max-width: 400px;
      margin: auto;
      background-color: #001d3d;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 10px #00ff88;
    }
    input, select {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 15px;
      text-align: center;
    }
    button {
      background-color: #00ff88;
      color: #000;
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }
    button:hover {
      background-color: #d4af37;
      color: #000;
    }
    .info {
      margin-top: 20px;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <h1>Wypłata - ACC INWESTYCJA</h1>

  <form onsubmit="event.preventDefault(); submitForm();">
    <input type="text" placeholder="Numer konta bankowego" required><br>
    <input type="text" placeholder="Imię i nazwisko posiadacza konta" required><br>

    <select required>
      <option value="">Wybierz bank</option>
      <option>PKO Bank Polski</option>
      <option>mBank</option>
      <option>Santander Bank Polska</option>
      <option>ING Bank Śląski</option>
      <option>Bank Pekao S.A.</option>
    </select><br>

    <input type="text" value="4 500 zł" readonly><br>

    <button type="submit">Zleć wypłatę</button>
    <button type="button" onclick="window.location.href='index.html'">Powrót</button>
  </form>

  <div class="info">
    Wypłaty są przetwarzane w ciągu 1–3 dni roboczych.  
    Wszelkie opłaty (jeśli występują) są jasno pokazane przed zatwierdzeniem.
  </div>

  <script>
    function submitForm() {
      alert("Twoje zlecenie wypłaty zostało przyjęte do realizacji.");
    }
  </script>
</body>
</html>
